moodle:
  base-url: https://aulavirtual33.educa.madrid.org/ies.garciamarquez.leganes
  service: moodle_mobile_app
  cursos-actuales: true

soft-skills:
  login-manual: true
  token-manual: eaeb9b18c8f25e4e0038e33e7bf8e07c

jwt:
  secret: mi_clave_super_secreta_para_firmar
  expiration: 3600000
  header: Authorization
  prefix: Bearer
  uri: /auth/**

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/softskills_db?useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 100
          order_inserts: true
          order_updates: true
          batch_versioned_data: true
  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE